<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colmi Ring Tools</title>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Colmi / QRing</p>
          <h1>Ring Tools</h1>
        </div>
        <div class="connection-actions">
          <button id="connectButton" class="primary-button" type="button">Connect Ring</button>
          <button id="disconnectButton" type="button" disabled>Disconnect</button>
        </div>
      </header>

      <section class="status-strip" aria-label="ring status">
        <div><span>Status</span><strong id="statusText">Idle</strong></div>
        <div><span>Device</span><strong id="deviceText">None</strong></div>
        <div><span>Hardware</span><strong id="hardwareText">Unknown</strong></div>
        <div><span>Firmware</span><strong id="firmwareText">Unknown</strong></div>
        <div><span>Battery</span><strong id="batteryText">Unknown</strong></div>
        <div><span>Raw Rate</span><strong id="rateText">0 Hz</strong></div>
      </section>

      <nav class="tabs" aria-label="tools">
        <button class="tab-button active" type="button" data-tab="flash">Flash</button>
        <button class="tab-button" type="button" data-tab="midi">MIDI</button>
        <button class="tab-button" type="button" data-tab="diagnostics">Diagnostics</button>
        <button class="tab-button" type="button" data-tab="docs">Docs</button>
      </nav>

      <section id="flashPanel" class="tool-panel active">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Firmware</p>
            <h2>Flasher</h2>
          </div>
          <button id="refreshFirmwareButton" type="button">Refresh Catalogue</button>
        </div>

        <div class="flash-grid">
          <label>
            Catalogue firmware
            <select id="firmwareSelect"></select>
          </label>
          <label>
            Custom firmware
            <input id="customFirmwareInput" type="file" accept=".bin,application/octet-stream" />
          </label>
          <label>
            Custom mode
            <select id="customInitTypeSelect">
              <option value="4">Normal</option>
              <option value="1">Recovery</option>
            </select>
          </label>
          <label>
            Confirmation
            <input id="confirmInput" type="text" autocomplete="off" placeholder="Required text appears here" />
          </label>
          <button id="loadFirmwareButton" type="button">Load Catalogue Firmware</button>
          <button id="flashButton" class="danger-button" type="button" disabled>Start Flash</button>
        </div>

        <div id="firmwareDetails" class="details-panel"></div>
        <ol id="flashStages" class="stage-list" aria-label="flash stages"></ol>
        <textarea id="flashLog" class="log-box" readonly aria-label="flash log"></textarea>
      </section>

      <section id="midiPanel" class="tool-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Controller</p>
            <h2>Motion to MIDI</h2>
          </div>
          <div class="button-row">
            <button id="midiRefreshButton" type="button">Refresh MIDI</button>
            <button id="midiPanicButton" type="button">All Notes Off</button>
          </div>
        </div>

        <div class="midi-grid">
          <label>
            MIDI output
            <select id="midiOutputSelect"></select>
          </label>
          <label>
            Channel
            <select id="midiChannelSelect"></select>
          </label>
          <div class="cc-field">
            <label for="xCcInput">X CC</label>
            <div>
              <input id="xCcInput" type="number" min="0" max="127" value="1" />
              <button id="xCcSendButton" type="button">Send</button>
            </div>
          </div>
          <div class="cc-field">
            <label for="yCcInput">Y CC</label>
            <div>
              <input id="yCcInput" type="number" min="0" max="127" value="74" />
              <button id="yCcSendButton" type="button">Send</button>
            </div>
          </div>
          <div class="cc-field">
            <label for="zCcInput">Z CC</label>
            <div>
              <input id="zCcInput" type="number" min="0" max="127" value="11" />
              <button id="zCcSendButton" type="button">Send</button>
            </div>
          </div>
          <label>
            Motion rate limit
            <input id="midiRateInput" type="number" min="5" max="100" value="25" />
          </label>
          <label>
            Smoothing
            <input id="smoothingInput" type="range" min="0" max="0.95" step="0.05" value="0.35" />
          </label>
          <label>
            Deadband
            <input id="deadbandInput" type="number" min="0" max="16" value="1" />
          </label>
        </div>

        <div class="toggle-row">
          <label><input id="invertXInput" type="checkbox" /> Invert X</label>
          <label><input id="invertYInput" type="checkbox" /> Invert Y</label>
          <label><input id="invertZInput" type="checkbox" /> Invert Z</label>
        </div>

        <div class="control-row">
          <button id="rawOnButton" type="button" disabled>Raw On</button>
          <button id="rawOffButton" type="button" disabled>Raw Off</button>
          <button id="quietSensorsButton" type="button" disabled>Quiet Sensors</button>
          <button id="healthOffButton" type="button" disabled>Health Logs Off</button>
        </div>

        <div class="axis-grid">
          <div><span>X</span><meter id="xMeter" min="0" max="127" value="64"></meter><strong id="xMidiText">64</strong></div>
          <div><span>Y</span><meter id="yMeter" min="0" max="127" value="64"></meter><strong id="yMidiText">64</strong></div>
          <div><span>Z</span><meter id="zMeter" min="0" max="127" value="64"></meter><strong id="zMidiText">64</strong></div>
        </div>
      </section>

      <section id="diagnosticsPanel" class="tool-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Ring</p>
            <h2>Diagnostics</h2>
          </div>
          <div class="button-row">
            <button id="exportDiagButton" type="button">Export JSON</button>
            <button id="clearDiagButton" type="button">Clear</button>
          </div>
        </div>
        <div id="compatibilityPanel" class="details-panel"></div>
        <textarea id="packetLog" class="log-box" readonly aria-label="packet log"></textarea>
      </section>

      <section id="docsPanel" class="tool-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Docs</p>
            <h2>Reference</h2>
          </div>
          <a class="manifest-link" href="./firmware/manifest.json">Firmware manifest</a>
        </div>
        <div id="docTabs" class="doc-tabs" aria-label="reference docs"></div>
        <article id="docContent" class="doc-content"></article>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
